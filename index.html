<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nana Event Voting</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        body::-webkit-scrollbar { display: none; }
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, addDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const { useState, useEffect, useRef, useMemo } = React;

        // --- User Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyCSCz-mN7eazAhj0ZycU-06M2vUjQ2YKOM",
            authDomain: "kyokousai-senyou.firebaseapp.com",
            projectId: "kyokousai-senyou",
            storageBucket: "kyokousai-senyou.firebasestorage.app",
            messagingSenderId: "710981006643",
            appId: "1:710981006643:web:417becd81133872bf83a46"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "nana-event-manager";

        // --- Lucide Icon Helper (Fixed to avoid toSvg error) ---
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name]);
            return (
                <span className={`inline-flex items-center justify-center ${className}`}>
                    <i data-lucide={name} style={{ width: '100%', height: '100%' }}></i>
                </span>
            );
        };

        function App() {
            // ==========================================
            // 管理画面のパスワード設定
            // ==========================================
            const ADMIN_PASSWORD = "dyanbo2107"; 
            // ==========================================

            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [isLoginPromptOpen, setIsLoginPromptOpen] = useState(false);
            const [sounds, setSounds] = useState([]);
            const [teams, setTeams] = useState([]); 
            const [votes, setVotes] = useState([]);
            const [eventConfig, setEventConfig] = useState({ title: 'nana Event Voting', imageUrl: '' });
            const [view, setView] = useState('vote');
            
            const [voterName, setVoterName] = useState('');
            const [teamName, setTeamName] = useState(''); 
            const [selectedIds, setSelectedIds] = useState([]);
            
            const [newSoundName, setNewSoundName] = useState('');
            const [newSoundTeam, setNewSoundTeam] = useState('');
            const [newTeamName, setNewTeamName] = useState(''); 
            const [adminPass, setAdminPass] = useState('');
            const [editTitle, setEditTitle] = useState('');
            const [editImageUrl, setEditImageUrl] = useState('');
            const [showToast, setShowToast] = useState(null);
            const [loginError, setLoginError] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (e) {
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth error", err);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const unsubConfig = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'event'), (ds) => {
                    if (ds.exists()) {
                        const d = ds.data();
                        setEventConfig(d);
                        setEditTitle(d.title || '');
                        setEditImageUrl(d.imageUrl || '');
                    }
                });
                
                const unsubSounds = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'sounds'), (s) => {
                    setSounds(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubTeams = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'teams'), (s) => {
                    const teamsData = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    // チームリスト自体はエントリー順でソート
                    teamsData.sort((a, b) => new Date(a.timestamp || 0) - new Date(b.timestamp || 0));
                    setTeams(teamsData);
                });
                
                const unsubVotes = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'votes'), (s) => {
                    setVotes(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubConfig(); unsubSounds(); unsubTeams(); unsubVotes(); };
            }, [user]);

            // チームのエントリー順（タイムスタンプ）をマップ化
            const teamTimestampMap = useMemo(() => {
                const map = {};
                teams.forEach(t => {
                    map[t.name] = new Date(t.timestamp || 0).getTime();
                });
                return map;
            }, [teams]);

            // サウンドリストを「所属チームのエントリー順」でソート
            const sortedSoundsByTeamEntry = useMemo(() => {
                return [...sounds].sort((a, b) => {
                    const timeA = teamTimestampMap[a.teamName] || Infinity;
                    const timeB = teamTimestampMap[b.teamName] || Infinity;
                    
                    if (timeA !== timeB) return timeA - timeB;
                    // 同じチーム内ならサウンドのエントリー順
                    return new Date(a.timestamp || 0) - new Date(b.timestamp || 0);
                });
            }, [sounds, teamTimestampMap]);

            const notify = (msg) => { setShowToast(msg); setTimeout(() => setShowToast(null), 4000); };
            
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 800 * 1024) return notify("800KB以下にしてください");
                const reader = new FileReader();
                reader.onloadend = () => { setEditImageUrl(reader.result); notify("読込完了（保存してください）"); };
                reader.readAsDataURL(file);
            };

            const submitVote = async () => {
                if (!user || selectedIds.length !== 3 || !voterName.trim() || !teamName) {
                    notify("入力内容に不足があります");
                    return;
                }

                // --- 重複投票チェック ---
                const existingVote = votes.find(v => v.teamName === teamName);
                if (existingVote) {
                    notify(`すでに${existingVote.voterName}さんが投票済です`);
                    return;
                }
                // -----------------------

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'votes'), {
                    voterName: voterName.trim(), 
                    teamName, 
                    selectedIds, 
                    timestamp: new Date().toISOString()
                });
                setView('thanks');
            };

            const voteCounts = (() => {
                const c = {}; sounds.forEach(s => c[s.id] = 0);
                votes.forEach(v => v.selectedIds.forEach(id => { if (c[id] !== undefined) c[id]++; }));
                return c;
            })();

            const sortedSoundsForRanking = [...sounds].map(s => {
                const count = voteCounts[s.id] || 0;
                const relevantVotes = votes.filter(v => v.selectedIds.includes(s.id));
                const lastVoteTime = relevantVotes.length > 0 
                    ? Math.max(...relevantVotes.map(v => new Date(v.timestamp).getTime())) 
                    : Infinity;
                return { ...s, count, lastVoteTime };
            }).sort((a, b) => {
                if (b.count !== a.count) return b.count - a.count;
                return a.lastVoteTime - b.lastVoteTime;
            });

            // 連番順位（Dense Ranking）
            let currentRank = 0;
            let lastCount = -1;
            const rankedSounds = sortedSoundsForRanking.map((s) => {
                if (s.count !== lastCount) {
                    currentRank++;
                    lastCount = s.count;
                }
                return { ...s, displayRank: currentRank };
            });

            // 自分のチームのサウンドを除外 + チームのエントリー順でソート
            const filteredSounds = sortedSoundsByTeamEntry.filter(s => s.teamName !== teamName);

            const isSubmitDisabled = !voterName.trim() || !teamName || selectedIds.length !== 3;

            const handleAdminLogin = (e) => {
                if(e) e.preventDefault();
                if (adminPass === ADMIN_PASSWORD) {
                    setIsAdmin(true);
                    setIsLoginPromptOpen(false);
                    setAdminPass('');
                    setView('admin');
                    notify("管理者としてログインしました");
                } else {
                    setLoginError(true);
                    notify("パスワードが違います");
                    setTimeout(() => setLoginError(false), 500);
                }
            };

            return (
                <div className="min-h-screen pb-40 text-slate-800 transition-all duration-500">
                    {showToast && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl text-xs font-bold animate-bounce text-center min-w-[280px]">
                            {showToast}
                        </div>
                    )}

                    {isLoginPromptOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-300">
                            <form 
                                onSubmit={handleAdminLogin}
                                className={`bg-white w-full max-sm p-8 rounded-[2.5rem] shadow-2xl space-y-6 transition-transform ${loginError ? 'animate-shake' : 'animate-in zoom-in-95 duration-200'}`}
                            >
                                <div className="text-center space-y-2">
                                    <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto shadow-inner">
                                        <Icon name="ShieldCheck" className="w-8 h-8" />
                                    </div>
                                    <h3 className="text-lg font-black text-slate-800">管理者ログイン</h3>
                                    <p className="text-xs text-slate-400 font-medium tracking-tight">パスワードを入力してください</p>
                                </div>

                                <input 
                                    autoFocus
                                    type="password" 
                                    value={adminPass} 
                                    onChange={e => setAdminPass(e.target.value)} 
                                    className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-400 outline-none text-center font-black tracking-widest transition-all"
                                    placeholder="••••••••"
                                />

                                <div className="grid grid-cols-2 gap-3">
                                    <button 
                                        type="button"
                                        onClick={() => { setIsLoginPromptOpen(false); setAdminPass(''); }}
                                        className="py-4 rounded-2xl font-bold text-xs text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors active:scale-95"
                                    >
                                        キャンセル
                                    </button>
                                    <button 
                                        type="submit"
                                        className="py-4 rounded-2xl font-black text-xs text-white bg-indigo-600 shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all"
                                    >
                                        ログイン
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}
                    
                    <div className="bg-gradient-to-r from-indigo-600 to-purple-500 p-8 text-white rounded-b-[2.5rem] shadow-xl mb-6 text-center border-b-4 border-white/20">
                        <h1 className="text-2xl font-black tracking-tight">{eventConfig.title || 'nana Event Voting'}</h1>
                        <p className="text-xs mt-2 opacity-80 font-medium tracking-tight text-indigo-50 font-black">所属チームを選択して、お気に入りの3音源に投票！</p>
                    </div>

                    <main className="max-w-md mx-auto px-5 space-y-8">
                        {view === 'vote' ? (
                            <>
                                {eventConfig.imageUrl && (
                                    <div className="rounded-3xl overflow-hidden shadow-2xl ring-4 ring-white transition-transform hover:scale-[1.01] duration-500">
                                        <img src={eventConfig.imageUrl} className="w-full aspect-video object-cover" />
                                    </div>
                                )}

                                <div className="bg-white p-6 rounded-3xl shadow-sm space-y-5 border border-slate-100">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 ml-1 tracking-widest flex justify-between">
                                            <span>お名前（nana名）</span>
                                            {!voterName.trim() && <span className="text-rose-400">必須</span>}
                                        </label>
                                        <input type="text" placeholder="名前を入力" value={voterName} onChange={e => setVoterName(e.target.value)} className={`w-full p-4 rounded-2xl bg-slate-50 border-2 outline-none text-sm font-bold placeholder-slate-300 transition-all ${!voterName.trim() ? 'border-transparent focus:border-indigo-300' : 'border-emerald-100 focus:border-emerald-300'}`} />
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 ml-1 tracking-widest flex justify-between">
                                            <span>所属チーム</span>
                                            {!teamName && <span className="text-rose-400 font-black">選択必須</span>}
                                        </label>
                                        <div className="relative">
                                            <select 
                                                value={teamName} 
                                                onChange={e => {
                                                    setTeamName(e.target.value);
                                                    setSelectedIds([]); 
                                                }} 
                                                className={`w-full p-4 rounded-2xl bg-slate-50 border-2 outline-none text-sm font-bold appearance-none cursor-pointer transition-all ${!teamName ? 'border-transparent focus:border-indigo-300' : 'border-emerald-100 focus:border-emerald-300'}`}
                                            >
                                                <option value="">チームを選択してください</option>
                                                {teams.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 text-[10px]">▼</div>
                                        </div>
                                        {teamName && <p className="text-[9px] text-indigo-500 font-bold ml-1 italic">※あなたのチーム以外の音源が表示されています</p>}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="flex justify-between items-center px-1">
                                        <h3 className="text-sm font-black text-slate-600 tracking-wider">エントリーサウンド</h3>
                                        <span className={`text-[10px] font-black px-3 py-1 rounded-full transition-all ${selectedIds.length === 3 ? 'bg-green-100 text-green-600' : 'bg-rose-50 text-rose-400'}`}>
                                            {selectedIds.length === 3 ? '選択完了' : `あと ${3 - selectedIds.length} 個選択`}
                                        </span>
                                    </div>
                                    <div className="grid gap-3">
                                        {filteredSounds.length > 0 ? filteredSounds.map(s => (
                                            <button 
                                                key={s.id} 
                                                onClick={() => setSelectedIds(p => p.includes(s.id) ? p.filter(i => i !== s.id) : (p.length < 3 ? [...p, s.id] : p))} 
                                                className={`w-full p-5 rounded-3xl border-2 flex justify-between items-center transition-all duration-300 ${selectedIds.includes(s.id) ? 'border-indigo-500 bg-indigo-50 shadow-lg scale-[1.02]' : 'border-transparent bg-white shadow-sm hover:border-slate-200'}`}
                                            >
                                                <div className="flex flex-col items-start">
                                                    <span className={`text-sm font-black ${selectedIds.includes(s.id) ? 'text-indigo-700' : 'text-slate-700'}`}>{s.name}</span>
                                                    <span className="text-[9px] text-slate-400 font-bold">{s.teamName}</span>
                                                </div>
                                                <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${selectedIds.includes(s.id) ? 'bg-indigo-500 border-indigo-500' : 'border-slate-300'}`}>
                                                    {selectedIds.includes(s.id) && <div className="w-2 h-2 bg-white rounded-full" />}
                                                </div>
                                            </button>
                                        )) : (
                                            <div className="bg-white p-10 rounded-3xl border-2 border-dashed border-slate-200 text-center">
                                                <p className="text-xs text-slate-400 font-bold italic">
                                                    {!teamName ? "チームを選択すると音源が表示されます" : "表示できる音源がありません"}
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <button 
                                    disabled={isSubmitDisabled} 
                                    onClick={submitVote} 
                                    className={`w-full py-5 rounded-3xl font-black text-lg shadow-2xl transition-all active:scale-95 ${isSubmitDisabled ? 'bg-slate-200 text-slate-400 cursor-not-allowed grayscale' : 'bg-indigo-600 text-white shadow-indigo-200 hover:bg-indigo-700'}`}
                                >
                                    投票を送信する
                                </button>
                            </>
                        ) : view === 'thanks' ? (
                            <div className="text-center py-24 animate-in fade-in zoom-in duration-500">
                                <div className="text-6xl mb-6 text-indigo-500 animate-pulse">🎉</div>
                                <h2 className="text-2xl font-black text-slate-800">投票が完了しました！</h2>
                                <p className="text-slate-400 text-sm mt-3 font-medium tracking-tight">あなたの熱い1票をお預かりしました。</p>
                                <button onClick={() => { setView('vote'); setSelectedIds([]); setVoterName(''); setTeamName(''); }} className="mt-12 text-indigo-600 font-black text-sm hover:underline p-4">← 投票画面へ戻る</button>
                            </div>
                        ) : (
                            /* 管理画面 */
                            <div className="space-y-8 animate-in slide-in-from-bottom duration-500 pb-20">
                                <div className="bg-white p-6 rounded-3xl shadow-sm space-y-5 border border-indigo-50">
                                    <h3 className="text-xs font-black text-indigo-500 border-b pb-3 tracking-widest flex items-center gap-2 font-black">
                                        <Icon name="Settings" className="w-4 h-4" /> イベント基本設定
                                    </h3>
                                    <div className="space-y-4">
                                        <div className="space-y-1">
                                            <span className="text-[10px] font-bold text-slate-400 ml-1">タイトル</span>
                                            <input type="text" value={editTitle} onChange={editTitle => setEditTitle(editTitle.target.value)} className="w-full p-3 bg-slate-50 rounded-2xl outline-none text-sm font-bold" placeholder="タイトル" />
                                        </div>
                                        <label className="flex flex-col items-center justify-center p-6 border-2 border-dashed border-slate-200 rounded-3xl cursor-pointer hover:bg-indigo-50 transition-colors group">
                                            <Icon name="Upload" className="w-6 h-6 text-slate-300 group-hover:text-indigo-400 transition-colors mb-2" />
                                            <span className="text-xs text-slate-400 font-bold group-hover:text-indigo-500 transition-colors">告知画像をアップロード (16:9)</span>
                                            <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                                        </label>
                                        <button onClick={() => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'event'), { title: editTitle, imageUrl: editImageUrl }).then(() => notify("保存しました"))} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg shadow-indigo-100 active:scale-95 transition-transform">設定を保存</button>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm space-y-5 border border-emerald-50">
                                    <h3 className="text-xs font-black text-emerald-500 border-b pb-3 tracking-widest flex items-center gap-2 font-black">
                                        <Icon name="Users" className="w-4 h-4" /> チームリスト管理
                                    </h3>
                                    <div className="flex gap-2">
                                        <input type="text" value={newTeamName} onChange={e => setNewTeamName(e.target.value)} className="flex-1 p-3 bg-slate-50 rounded-2xl outline-none text-sm font-bold placeholder-slate-300" placeholder="新しいチーム名" />
                                        <button onClick={() => { 
                                            if(newTeamName){ 
                                                addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'teams'), { 
                                                    name: newTeamName,
                                                    timestamp: new Date().toISOString()
                                                }).then(() => setNewTeamName('')); 
                                            } 
                                        }} className="bg-emerald-600 text-white px-6 rounded-2xl font-bold text-xs shadow-lg active:scale-95 transition-transform">追加</button>
                                    </div>
                                    <div className="flex flex-wrap gap-2 pt-2">
                                        {teams.map(t => (
                                            <div key={t.id} className="flex items-center gap-2 bg-emerald-50 text-emerald-700 px-4 py-2 rounded-2xl text-[10px] font-bold border border-emerald-100 shadow-sm transition-all hover:bg-emerald-100 font-black">
                                                {t.name}
                                                <button onClick={() => confirm(`チーム「${t.name}」を削除しますか？`) && deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'teams', t.id))} className="hover:text-rose-500 p-1">
                                                    <Icon name="X" className="w-3 h-3" />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm space-y-5 border border-indigo-50">
                                    <h3 className="text-xs font-black text-indigo-500 border-b pb-3 tracking-widest flex items-center gap-2 font-black">
                                        <Icon name="Music" className="w-4 h-4" /> サウンドエントリー
                                    </h3>
                                    <div className="space-y-3">
                                        <div className="flex gap-2">
                                            <input type="text" value={newSoundName} onChange={e => setNewSoundName(e.target.value)} className="flex-1 p-3 bg-slate-50 rounded-2xl outline-none text-sm font-bold placeholder-slate-300" placeholder="サウンド名を追加" />
                                        </div>
                                        <div className="flex gap-2">
                                            <select 
                                                value={newSoundTeam} 
                                                onChange={e => setNewSoundTeam(e.target.value)}
                                                className="flex-1 p-3 bg-slate-50 rounded-2xl outline-none text-xs font-bold appearance-none cursor-pointer border-2 border-slate-100 focus:border-indigo-300"
                                            >
                                                <option value="">所属チームを選択</option>
                                                {teams.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
                                            </select>
                                            <button 
                                                onClick={() => { 
                                                    if(newSoundName && newSoundTeam){ 
                                                        addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sounds'), { 
                                                            name: newSoundName, 
                                                            teamName: newSoundTeam,
                                                            timestamp: new Date().toISOString()
                                                        }).then(() => {
                                                            setNewSoundName('');
                                                            setNewSoundTeam('');
                                                        }); 
                                                    } else {
                                                        notify("名前とチームの両方が必要です");
                                                    }
                                                }} 
                                                className="bg-indigo-600 text-white px-10 rounded-2xl font-black text-xs shadow-lg active:scale-95 transition-transform"
                                            >
                                                追加
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm space-y-6 border border-slate-100">
                                    <div className="flex justify-between items-center border-b pb-3">
                                        <h3 className="text-xs font-black text-slate-500 border-b-transparent tracking-widest flex items-center gap-2 font-black">
                                            <Icon name="Award" className="w-4 h-4" /> ランキング集計 ({votes.length}票)
                                        </h3>
                                        <button onClick={() => confirm("全ての投票を削除しますか？") && getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'votes')).then(qs => { const b = writeBatch(db); qs.forEach(d => b.delete(d.ref)); b.commit(); })} className="text-[10px] text-rose-500 font-bold border border-rose-100 px-3 py-2 rounded-xl bg-rose-50 transition-colors active:bg-rose-100 font-black tracking-tighter">全リセット</button>
                                    </div>
                                    <div className="space-y-6">
                                        {rankedSounds.length > 0 ? rankedSounds.map((s, index) => {
                                            const isTop = s.displayRank <= 3;
                                            const rankColors = ["bg-yellow-400", "bg-slate-400", "bg-amber-600"];

                                            return (
                                                <div key={s.id} className="space-y-2 animate-in slide-in-from-left duration-300">
                                                    <div className="flex justify-between items-end text-xs font-black">
                                                        <div className="flex items-center gap-3">
                                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-[11px] shadow-sm text-white font-black shrink-0 ${s.displayRank <= 3 ? rankColors[s.displayRank-1] : "bg-slate-100 text-slate-500 border border-slate-200"}`}>
                                                                {s.displayRank}
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <button 
                                                                    onClick={() => confirm(`${s.name} を削除しますか？`) && deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sounds', s.id))} 
                                                                    className="flex items-center justify-center w-8 h-8 rounded-full bg-rose-50 text-rose-500 hover:bg-rose-100 hover:text-rose-600 transition-all active:scale-90 shadow-sm border border-rose-100 shrink-0"
                                                                >
                                                                    <Icon name="Trash2" className="w-4 h-4" />
                                                                </button>
                                                                <div className="flex flex-col">
                                                                    <span className={`${isTop ? "text-slate-800 text-sm font-black" : "text-slate-600 font-bold"}`}>{s.name}</span>
                                                                    <span className="text-[8px] text-slate-400 font-black">{s.teamName}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col items-end">
                                                            <span className={`font-black ${isTop ? "text-indigo-600 text-sm" : "text-indigo-400"}`}>{s.count} <span className="text-[8px] opacity-60 font-black">票</span></span>
                                                        </div>
                                                    </div>
                                                    <div className="w-full bg-slate-100 h-3 rounded-full overflow-hidden shadow-inner border border-slate-50">
                                                        <div 
                                                            className={`h-full transition-all duration-1000 ease-out shadow-sm ${
                                                                s.displayRank === 1 ? "bg-gradient-to-r from-yellow-400 to-amber-300" :
                                                                s.displayRank === 2 ? "bg-gradient-to-r from-slate-400 to-slate-300" :
                                                                s.displayRank === 3 ? "bg-gradient-to-r from-amber-600 to-amber-500" :
                                                                "bg-indigo-400 opacity-60"
                                                            }`} 
                                                            style={{ width: `${votes.length > 0 ? (s.count / (votes.length * 3) * 100 * 3) : 0}%` }} 
                                                        />
                                                    </div>
                                                </div>
                                            );
                                        }) : <p className="text-center text-slate-300 text-xs py-10 font-bold italic tracking-widest">NO DATA AVAILABLE</p>}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Navigation */}
                    <footer className="fixed bottom-0 left-0 right-0 p-6 bg-white/90 backdrop-blur-xl border-t border-slate-100 flex justify-center gap-3 z-50 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                        {isAdmin ? (
                            <button 
                                onClick={() => setView(v => v === 'admin' ? 'vote' : 'admin')} 
                                className="bg-indigo-600 text-white px-12 py-4 rounded-full font-black text-sm shadow-2xl shadow-indigo-200 active:scale-95 transition-all flex items-center gap-2"
                            >
                                <Icon name={view === 'admin' ? "Layout" : "Settings"} className="w-4 h-4" />
                                {view === 'admin' ? '投票画面（プレビュー）' : '管理メニューに戻る'}
                            </button>
                        ) : (
                            <button 
                                onClick={() => setIsLoginPromptOpen(true)}
                                className="bg-slate-900 text-white px-12 py-4 rounded-full font-black text-sm shadow-xl active:scale-95 transition-all flex items-center gap-2"
                            >
                                <Icon name="ShieldCheck" className="w-4 h-4" />
                                管理者ログイン
                            </button>
                        )}
                    </footer>

                    <style>{`
                        @keyframes shake {
                            0%, 100% { transform: translateX(0); }
                            25% { transform: translateX(-5px); }
                            75% { transform: translateX(5px); }
                        }
                        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
                    `}</style>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
